<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrollCraft Vanilla JS Example</title>
    <!-- Basic styling for the immersive container -->
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #111;
            color: white;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* The container determines how long the scroll effect lasts */
        #scft-container {
            position: relative;
        }

        /* The canvas inside is sticky to remain visible while scrolling the container */
        #scft-container_inner_sticky {
            position: sticky;
            top: 0;
            overflow: hidden;
        }

        /* This div will act as our subject overlay, tracking coordinates */
        #apple-overlay {
            position: absolute;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            white-space: nowrap;
            /* Transform handles centering around the coordinate point */
            transform: translate(-50%, -50%);
            /* Smoothing CSS for positioning - should be somehow related to scrub value */
            transition: left 0.05s linear, top 0.05s linear;
            z-index: 10;
            display: none;
            /* hidden until tracking data is ready */
        }

        .outro {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>Vanilla ScrollCraft </h1>
        <p>Scroll down to initialize the engine</p>
    </div>

    <!-- The Scroll Container -->
    <div class="scft-container" style="height:400vh"
        data-scft-container="remaining attributes here as in the react part">
        <!-- The Sticky Viewport -->
        <div class="scft-container_inner_sticky" style="height:100vh;width:100%">
            <!-- Layer (non tracking)-->
            <div class="scft-layer" style="justify-content: center; align-items: center"
                data-scft-layer="remaining attributes here as in react">
                <div class="scft-canvas" style="width:100%; height:100%"
                    data-scft-canvas="remaining attributes here, project etc...">
                    <!-- CoreEngine will dynamically inject the <canvas> here -->
                </div>
            </div>

            <!-- Overlay that will naturally lock to the 'main' subject -->
            <div class="scft-layer-tracking" data-scft-layer-tracking="id">
                <div class="apple-overlay">🍎 Apple Tracking</div>
            </div>


            <!-- Layer (non tracking )-->
            <div class="scft-layer" style="justify-content: left; align-items: end;"
                data-scft-layer="remaining attributes here as in react">

                <h1>Hello world</h1>
                <p>how are you? (not sure about the justify content and align items, but hey, this is just a
                    brainstorm.)</p>
            </div>


        </div>

    </div>

    <div class="outro">
        <h2>End of Sequence</h2>
    </div>
