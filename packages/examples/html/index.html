<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrollCraft Vanilla JS Example</title>
    <!-- Basic styling for the immersive container -->
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #111;
            color: white;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* The container determines how long the scroll effect lasts */
        #scft-container {
            position: relative;
        }

        /* The canvas inside is sticky to remain visible while scrolling the container */
        #scft-container_inner_sticky {
            position: sticky;
            top: 0;
            overflow: hidden;
        }

        /* This div will act as our subject overlay, tracking coordinates */
        #apple-overlay {
            position: absolute;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            white-space: nowrap;
            /* Transform handles centering around the coordinate point */
            transform: translate(-50%, -50%);
            /* Smoothing CSS for positioning - should be somehow related to scrub value */
            transition: left 0.05s linear, top 0.05s linear;
            z-index: 10;
            display: none;
            /* hidden until tracking data is ready */
        }

        .outro {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>Vanilla ScrollCraft </h1>
        <p>Scroll down to initialize the engine</p>
    </div>

    <!-- The Scroll Container -->
    <div class="scft-container" style="height:400vh" data-scft-offset='["start end", "end start"]'>
        <!-- The Sticky Viewport -->
        <div class="scft-container_inner_sticky" style="height:100vh;width:100%">
            <!-- Layer (non tracking)-->
            <div class="scft-layer" style="display: flex; justify-content: center; align-items: center">
                <div class="scft-canvas" style="width:100%; height:100%" data-scft-canvas="/jabko2/scrollcraft.json">
                    <!-- CoreEngine will dynamically inject the <canvas> here -->
                </div>
            </div>

            <!-- Overlay that will naturally lock to the 'main' subject -->
            <div class="scft-layer-tracking" data-scft-layer-tracking="main">
                <div id="apple-overlay" style="display: block">🍎 Apple Tracking</div>
            </div>

            <!-- Layer (non tracking )-->
            <div class="scft-layer"
                style="display: flex; justify-content: flex-start; align-items: flex-end; padding: 10vh;">
                <div data-scft-animate='{"opacity": [0, 1, 1, 0]}'>
                    <h1 style="font-size: 3rem; margin: 0;">Hello world</h1>
                    <p style="opacity: 0.7;">This is now a fully functional Vanilla example!</p>
                </div>
            </div>
        </div>
    </div>


    <div class="outro">
        <h2>End of Sequence</h2>
    </div>

    <!-- Vite will resolve this relative path to the typescript source automatically -->
    <script type="module">
        import ScrollCraft from '../../scrollcraft/src/core/index.ts';

        document.addEventListener('DOMContentLoaded', async () => {
            console.log("Initializing ScrollCraft...");

            try {
                const orchestrators = await ScrollCraft.CoreOrchestrator.initAll();
                console.log("ScrollCraft Initialized!", orchestrators);
            } catch (e) {
                console.error("Failed to boot ScrollCraft: ", e);
            }
        });
    </script>
</body>

</html>
